<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寿司カウント</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            color: white;
        }

        .app-title {
            font-size: 1.5em;
            font-weight: bold;
        }

        .settings-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .settings-button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
            margin-top: 60px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 2em;
        }

        .sushi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .sushi-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .plate-container {
            position: relative;
            width: 120px;
            height: 120px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .plate-container:hover {
            transform: scale(1.05);
        }

        .plate-container:active {
            transform: scale(0.95);
        }

        .plate-svg {
            width: 100%;
            height: 100%;
        }

        .count-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            pointer-events: none;
            min-width: 40px;
            text-align: center;
        }

        .price-label {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            text-align: center;
        }

        .price-yen {
            font-size: 0.9em;
            color: #666;
        }

        .button-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 8px;
        }

        .minus-button {
            background: #ff6b6b;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .minus-button:hover {
            background: #ff5252;
            transform: scale(1.1);
        }

        .minus-button:active {
            transform: scale(0.95);
        }

        .summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .summary-title {
            font-size: 1.3em;
            margin-bottom: 15px;
        }

        .total-amount {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        /* その他の金額セクション */
        .custom-amount-section {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .custom-amount-title {
            font-size: 0.95em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .custom-amount-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .custom-amount-input {
            flex: 1;
            padding: 8px 10px;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-size: 0.9em;
            min-width: 80px;
        }

        .custom-amount-add-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .custom-amount-add-button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .custom-amount-add-button:active {
            transform: scale(0.95);
        }

        .custom-amounts-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .custom-amount-item {
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .custom-amount-item-price {
            font-weight: bold;
            color: #667eea;
        }

        .custom-amount-item-delete {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 1.2em;
            padding: 0;
            line-height: 1;
            transition: all 0.2s ease;
        }

        .custom-amount-item-delete:hover {
            color: #ff5252;
            transform: scale(1.2);
        }

        .reset-button, .settings-button-main {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-button:hover, .settings-button-main:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .reset-button:active, .settings-button-main:active {
            transform: scale(0.95);
        }

        /* モーダル */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-button {
            background: none;
            border: none;
            font-size: 2em;
            cursor: pointer;
            color: #999;
        }

        .close-button:hover {
            color: #333;
        }

        .settings-section {
            margin-bottom: 30px;
        }

        .settings-section-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .background-setting {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .background-setting label {
            font-weight: bold;
            color: #333;
        }

        .background-setting input {
            width: 100px;
            height: 50px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
        }

        .sushi-settings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .sushi-setting-item {
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sushi-setting-item.empty {
            background: #f9f9f9;
        }

        .setting-input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .setting-input-group label {
            font-weight: bold;
            color: #555;
            font-size: 0.9em;
        }

        .setting-input-group input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
        }

        .setting-input-group input[type="color"] {
            width: 100%;
            height: 40px;
            cursor: pointer;
        }

        .setting-input-group input[type="number"] {
            width: 100%;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .modal-button {
            padding: 12px 30px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-save-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .modal-save-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .modal-cancel-button {
            background: #ddd;
            color: #333;
        }

        .modal-cancel-button:hover {
            background: #ccc;
        }

        .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            border: 2px solid #ddd;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin-top: 80px;
            }

            h1 {
                font-size: 1.8em;
                margin-bottom: 20px;
            }

            .sushi-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                gap: 20px;
            }

            .plate-container {
                width: 100px;
                height: 100px;
            }

            .count-display {
                font-size: 1.5em;
            }

            .total-amount {
                font-size: 2em;
            }

            .modal-content {
                padding: 20px;
            }

            .sushi-settings {
                grid-template-columns: 1fr;
            }
        }

        @keyframes scale-pop {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="app-title">🍣 寿司カウント</div>
        <button class="settings-button" id="topSettingsButton">⚙️ 設定</button>
    </div>

    <div class="container">
        <h1>🍣 寿司カウント 🍣</h1>
        
        <div class="sushi-grid" id="sushiGrid">
            <!-- JavaScriptで動的に生成 -->
        </div>

        <div class="summary">
            <div class="summary-title">合計金額</div>
            <div class="total-amount" id="totalAmount">¥0</div>
            
            <!-- その他の金額セクション -->
            <div class="custom-amount-section">
                <div class="custom-amount-title">その他の金額</div>
                <div class="custom-amount-input-group">
                    <input type="number" id="customAmountInput" class="custom-amount-input" placeholder="金額を入力" min="0">
                    <button class="custom-amount-add-button" id="addCustomAmountButton">追加</button>
                </div>
                <div class="custom-amounts-list" id="customAmountsList">
                    <!-- JavaScriptで動的に生成 -->
                </div>
            </div>
            
            <div class="button-group">
                <button class="reset-button" id="resetButton">リセット</button>
                <button class="settings-button-main" id="settingsButton">⚙️ 設定</button>
            </div>
        </div>
    </div>

    <!-- 設定モーダル -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>設定</span>
                <button class="close-button" id="closeModalButton">&times;</button>
            </div>

            <!-- 背景色設定 -->
            <div class="settings-section">
                <div class="settings-section-title">背景色設定</div>
                <div class="background-setting">
                    <label for="bgColorInput">背景色を選択：</label>
                    <input type="color" id="bgColorInput" value="#667eea">
                    <div class="color-preview" id="bgColorPreview" style="background: #667eea;"></div>
                </div>
                <div class="background-setting">
                    <label for="bgColorInput2">グラデーション色2：</label>
                    <input type="color" id="bgColorInput2" value="#764ba2">
                    <div class="color-preview" id="bgColorPreview2" style="background: #764ba2;"></div>
                </div>
                <div class="background-setting">
                    <label for="textSizeInput">カウント数字の大きさ（em）：</label>
                    <input type="number" id="textSizeInput" value="1.25" min="0.5" max="5" step="0.1">
                </div>
            </div>

            <!-- お寿司設定 -->
            <div class="settings-section">
                <div class="settings-section-title">お寿司の品目設定（10種類）</div>
                <div class="sushi-settings" id="sushiSettings">
                    <!-- JavaScriptで動的に生成 -->
                </div>
            </div>

            <!-- 保存ボタン -->
            <div class="modal-buttons">
                <button class="modal-button modal-save-button" id="saveSettingsButton">保存</button>
                <button class="modal-button modal-cancel-button" id="cancelSettingsButton">キャンセル</button>
            </div>
        </div>
    </div>

    <script>
        // デフォルト設定
        const defaultSushiPrices = [
            { name: '玉子', price: 100, color: '#FFD700', textColor: '#CC7000' },
            { name: 'マグロ', price: 150, color: '#8B0000', textColor: '#FF6B6B' },
            { name: 'サーモン', price: 180, color: '#FF6B6B', textColor: '#CC0000' },
            { name: 'エビ', price: 120, color: '#FF69B4', textColor: '#C71585' },
            { name: 'イカ', price: 140, color: '#E6E6FA', textColor: '#663399' },
            { name: 'ホタテ', price: 160, color: '#FFF8DC', textColor: '#CC7000' },
            { name: 'ウニ', price: 200, color: '#FFB6C1', textColor: '#C71585' },
            { name: 'トロ', price: 250, color: '#DC143C', textColor: '#FF6B6B' },
            { name: '穴子', price: 130, color: '#8B4513', textColor: '#FFD700' },
            { name: 'イクラ', price: 170, color: '#FF4500', textColor: '#CC3300' }
        ];

        let sushiPrices = JSON.parse(JSON.stringify(defaultSushiPrices));
        let backgroundColors = { color1: '#667eea', color2: '#764ba2' };
        let textSize = 1.25; // 20pt
        const counts = {};
        let customAmounts = []; // その他の金額を管理
        sushiPrices.forEach((_, index) => {
            counts[index] = 0;
        });

        // ローカルストレージから設定を読み込む
        function loadSettings() {
            const savedSushi = localStorage.getItem('sushiPrices');
            const savedBg = localStorage.getItem('backgroundColors');
            const savedTextSize = localStorage.getItem('textSize');
            const savedCustomAmounts = localStorage.getItem('customAmounts');
            
            if (savedSushi) {
                sushiPrices = JSON.parse(savedSushi);
            }
            if (savedBg) {
                backgroundColors = JSON.parse(savedBg);
            }
            if (savedTextSize) {
                textSize = parseFloat(savedTextSize);
            }
            if (savedCustomAmounts) {
                customAmounts = JSON.parse(savedCustomAmounts);
            }
            
            applyBackgroundColor();
        }

        // 設定を保存
        function saveSettings() {
            localStorage.setItem('sushiPrices', JSON.stringify(sushiPrices));
            localStorage.setItem('backgroundColors', JSON.stringify(backgroundColors));
            localStorage.setItem('textSize', textSize);
            localStorage.setItem('customAmounts', JSON.stringify(customAmounts));
        }

        // DOMが読み込まれたときに実行
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            initializeSushiGrid();
            initializeSettings();
            updateCustomAmountsList();
            setupEventListeners();
            updateTotal();
        });

        // イベントリスナー設定
        function setupEventListeners() {
            document.getElementById('settingsButton').addEventListener('click', openSettingsModal);
            document.getElementById('topSettingsButton').addEventListener('click', openSettingsModal);
            document.getElementById('closeModalButton').addEventListener('click', closeSettingsModal);
            document.getElementById('cancelSettingsButton').addEventListener('click', closeSettingsModal);
            document.getElementById('saveSettingsButton').addEventListener('click', applyAndSaveSettings);
            document.getElementById('resetButton').addEventListener('click', resetCounts);
            
            document.getElementById('bgColorInput').addEventListener('input', updateBgColorPreview);
            document.getElementById('bgColorInput2').addEventListener('input', updateBgColorPreview2);
            
            // カスタム金額のイベントリスナー
            document.getElementById('addCustomAmountButton').addEventListener('click', addCustomAmount);
            document.getElementById('customAmountInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addCustomAmount();
                }
            });
        }

        // 背景色プレビュー更新
        function updateBgColorPreview() {
            const color = document.getElementById('bgColorInput').value;
            document.getElementById('bgColorPreview').style.background = color;
        }

        function updateBgColorPreview2() {
            const color = document.getElementById('bgColorInput2').value;
            document.getElementById('bgColorPreview2').style.background = color;
        }

        // お寿司グリッドを初期化
        function initializeSushiGrid() {
            const grid = document.getElementById('sushiGrid');
            grid.innerHTML = '';
            
            sushiPrices.forEach((sushi, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'sushi-item';
                
                const containerDiv = document.createElement('div');
                containerDiv.className = 'plate-container';
                containerDiv.id = `plate-${index}`;
                
                const svg = createPlateSVG(sushi.color);
                containerDiv.innerHTML = svg;
                
                const countDisplay = document.createElement('div');
                countDisplay.className = 'count-display';
                countDisplay.id = `count-${index}`;
                countDisplay.textContent = '0';
                countDisplay.style.color = sushi.textColor;
                countDisplay.style.fontSize = `${textSize}em`;
                containerDiv.appendChild(countDisplay);
                
                containerDiv.addEventListener('click', () => {
                    counts[index]++;
                    updateDisplay(index);
                    updateTotal();
                });
                
                itemDiv.appendChild(containerDiv);
                
                const priceLabel = document.createElement('div');
                priceLabel.className = 'price-label';
                priceLabel.textContent = sushi.name;
                itemDiv.appendChild(priceLabel);
                
                const priceYen = document.createElement('div');
                priceYen.className = 'price-yen';
                priceYen.textContent = `¥${sushi.price}`;
                itemDiv.appendChild(priceYen);
                
                // マイナスボタンを追加
                const buttonContainer = document.createElement('div');
                buttonContainer.className = 'button-container';
                
                const minusButton = document.createElement('button');
                minusButton.className = 'minus-button';
                minusButton.textContent = '−';
                minusButton.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (counts[index] > 0) {
                        counts[index]--;
                        updateDisplay(index);
                        updateTotal();
                    }
                });
                buttonContainer.appendChild(minusButton);
                itemDiv.appendChild(buttonContainer);
                
                grid.appendChild(itemDiv);
            });
        }

        // 設定パネルを初期化
        function initializeSettings() {
            const settingsDiv = document.getElementById('sushiSettings');
            settingsDiv.innerHTML = '';
            
            sushiPrices.forEach((sushi, index) => {
                const settingItem = document.createElement('div');
                settingItem.className = 'sushi-setting-item';
                settingItem.innerHTML = `
                    <div style="font-weight: bold; color: #333;">品目 ${index + 1}</div>
                    <div class="setting-input-group">
                        <label>名前</label>
                        <input type="text" class="setting-name" data-index="${index}" value="${sushi.name}">
                    </div>
                    <div class="setting-input-group">
                        <label>価格（円）</label>
                        <input type="number" class="setting-price" data-index="${index}" value="${sushi.price}" min="0">
                    </div>
                    <div class="setting-input-group">
                        <label>お皿の色</label>
                        <input type="color" class="setting-color" data-index="${index}" value="${sushi.color}">
                    </div>
                    <div class="setting-input-group">
                        <label>文字の色</label>
                        <input type="color" class="setting-text-color" data-index="${index}" value="${sushi.textColor}">
                    </div>
                `;
                settingsDiv.appendChild(settingItem);
            });
        }

        // 設定モーダルを開く
        function openSettingsModal() {
            document.getElementById('bgColorInput').value = backgroundColors.color1;
            document.getElementById('bgColorInput2').value = backgroundColors.color2;
            document.getElementById('bgColorPreview').style.background = backgroundColors.color1;
            document.getElementById('bgColorPreview2').style.background = backgroundColors.color2;
            document.getElementById('textSizeInput').value = textSize;
            
            document.getElementById('settingsModal').classList.add('active');
        }

        // 設定モーダルを閉じる
        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        // 設定を適用して保存
        function applyAndSaveSettings() {
            // お寿司設定を取得
            document.querySelectorAll('.setting-name').forEach(input => {
                const index = parseInt(input.dataset.index);
                sushiPrices[index].name = input.value || `品目${index + 1}`;
            });

            document.querySelectorAll('.setting-price').forEach(input => {
                const index = parseInt(input.dataset.index);
                sushiPrices[index].price = parseInt(input.value) || 0;
            });

            document.querySelectorAll('.setting-color').forEach(input => {
                const index = parseInt(input.dataset.index);
                sushiPrices[index].color = input.value;
            });

            document.querySelectorAll('.setting-text-color').forEach(input => {
                const index = parseInt(input.dataset.index);
                sushiPrices[index].textColor = input.value;
            });

            // 背景色と文字サイズ設定を取得
            backgroundColors.color1 = document.getElementById('bgColorInput').value;
            backgroundColors.color2 = document.getElementById('bgColorInput2').value;
            textSize = parseFloat(document.getElementById('textSizeInput').value);

            // 設定を保存
            saveSettings();

            // UIを更新
            applyBackgroundColor();
            initializeSushiGrid();
            updateTotal();

            closeSettingsModal();
        }

        // 背景色を適用
        function applyBackgroundColor() {
            document.body.style.background = `linear-gradient(135deg, ${backgroundColors.color1} 0%, ${backgroundColors.color2} 100%)`;
        }

        // カウント数をリセット
        function resetCounts() {
            sushiPrices.forEach((_, index) => {
                counts[index] = 0;
                updateDisplay(index);
            });
            updateTotal();
        }

        // カスタム金額を追加
        function addCustomAmount() {
            const input = document.getElementById('customAmountInput');
            const amount = parseInt(input.value);
            
            if (isNaN(amount) || amount <= 0) {
                alert('正の数値を入力してください');
                return;
            }
            
            customAmounts.push(amount);
            input.value = '';
            updateCustomAmountsList();
            updateTotal();
            saveSettings();
        }

        // カスタム金額リストを更新
        function updateCustomAmountsList() {
            const list = document.getElementById('customAmountsList');
            list.innerHTML = '';
            
            customAmounts.forEach((amount, index) => {
                const item = document.createElement('div');
                item.className = 'custom-amount-item';
                item.innerHTML = `
                    <span class="custom-amount-item-price">¥${amount.toLocaleString()}</span>
                    <button class="custom-amount-item-delete">×</button>
                `;
                
                item.querySelector('.custom-amount-item-delete').addEventListener('click', () => {
                    customAmounts.splice(index, 1);
                    updateCustomAmountsList();
                    updateTotal();
                    saveSettings();
                });
                
                list.appendChild(item);
            });
        }

        // お皿のSVGを作成
        function createPlateSVG(color) {
            return `
                <svg class="plate-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="60" cy="50" rx="50" ry="40" fill="${color}" stroke="#ddd" stroke-width="2"/>
                    <ellipse cx="60" cy="45" rx="48" ry="35" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
                    <circle cx="60" cy="60" r="52" fill="none" stroke="#ccc" stroke-width="1" opacity="0.5"/>
                </svg>
            `;
        }

        // 表示を更新
        function updateDisplay(index) {
            const countDisplay = document.getElementById(`count-${index}`);
            countDisplay.textContent = counts[index];
            
            countDisplay.style.animation = 'none';
            setTimeout(() => {
                countDisplay.style.animation = 'scale-pop 0.3s ease';
            }, 10);
        }

        // 合計金額を更新
        function updateTotal() {
            let total = 0;
            sushiPrices.forEach((sushi, index) => {
                total += sushi.price * counts[index];
            });
            
            // カスタム金額を追加
            customAmounts.forEach((amount) => {
                total += amount;
            });
            
            const totalAmount = document.getElementById('totalAmount');
            totalAmount.textContent = `¥${total.toLocaleString()}`;
        }

        // モーダル外をクリックで閉じる
        document.getElementById('settingsModal').addEventListener('click', (e) => {
            if (e.target.id === 'settingsModal') {
                closeSettingsModal();
            }
        });
    </script>
</body>
</html>
